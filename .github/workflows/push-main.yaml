name: Publish Main Version

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up npm for linting
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Lint Markdown
        run: npm ci && npm run mdlint

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Latest version
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    env:
      KUBE_CONFIG: '${{ secrets.KUBECONFIG_TEST_AV2 }}'
      HELM_RELEASE: 'latest'
      NAMESPACE: 'pitc-cicd-dagger-techlab-prod'
      TRAINING_VERSION: '${{ github.sha }}'
      HELM_NAME: 'dagger-techlab-puzzle'
    steps:
      - name: Make scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Create KUBECONFIG
        env:
          KUBE_CONFIG: '${{ secrets.KUBECONFIG_TEST_AV2 }}'
        run: bash ./scripts/create_kubeconfig.sh

      - name: Deploy Helm Release
        run: bash ./scripts/deploy_helm_release.sh
        
      - name: Redeploy Deployments
        run: bash ./scripts/redeploy_deployment.sh
